nimations {
    # Ativa todas as animações do Hyprland.
    enabled = true

    # =====================================================================
    # CURVAS (BEZIERS)
    # Cada curva define como uma animação acelera e desacelera.
    # =====================================================================

	
    # Usada pelo Special Workspace.
    bezier = specialWorkSwitch, 0.05, 0.7, 0.1, 1

    # Aceleração rápida.
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15

    # Desaceleração suave.
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1

    # Curva padrão.
    bezier = standard, 0.2, 0, 0, 1

    # Curva bem suave.
    bezier = soft, 0.25, 0.1, 0.25, 1

    # Movimento linear (sem aceleração).
    bezier = linear, 0.00, 0.00, 1.00, 1.00

    # Saída rápida e desaceleração longa.
    bezier = easeOutQuint, 0.23, 1.00, 0.32, 1.00

    # Quase linear.
    bezier = almostLinear, 0.50, 0.50, 0.75, 1.00

    # Curva usada pelas janelas (leve efeito elástico).
    bezier = overshoot, 0.05, 0.90, 0.10, 1.10

    # Curva Fluent (mantida para o Special Workspace).
    bezier = fluent_decel, 0.1, 1, 0, 1

    # Curva importada da config Diablo-1.
    # Produz um efeito de desaceleração mais "cinematográfico"
    # ao trocar de workspace.
    bezier = overshot, 0.13, 0.99, 0.29, 1.08


    # =====================================================================
    # ANIMAÇÕES DAS CAMADAS (Waybar, notificações, menus...)
    # =====================================================================

    # Entrada das camadas com pequeno zoom.
    animation = layersIn, 1, 5, emphasizedDecel, popin 87%

    # Saída das camadas.
	animation = layersOut, 1, 1.49, linear, fade

    # Fade geral.
    animation = fadeLayers, 1, 5, standard

    # Fade ao aparecer.
    animation = fadeLayersIn, 1, 1.79, almostLinear

    # Fade ao desaparecer.
    animation = fadeLayersOut, 1, 1.39, almostLinear


    # =====================================================================
    # ANIMAÇÕES DAS JANELAS
    # =====================================================================

    # Abrir janela.
    animation = windowsIn, 1, 4.10, overshoot, gnomed

    # Fechar janela.
    animation = windowsOut, 1, 1.49, linear, gnomed

    # Mover janela.
    animation = windowsMove, 1, 4.10, overshoot


    # =====================================================================
    # WORKSPACES
    # =====================================================================

    # Troca entre workspaces.
    #
    # 1 = ativada
    # 5 = duração (experimente entre 4 e 6)
    # overshot = curva herdada da config Diablo-1
    # slidevert = desliza verticalmente
    #
    # Se quiser horizontal, troque slidevert por slide.
    animation = workspaces, 1, 5, overshot, slidevert


    # =====================================================================
    # SPECIAL WORKSPACE
    # =====================================================================

    # Mantido exatamente como estava.
    animation = specialWorkspace, 1, 3, specialWorkSwitch, slidefadevert 15%

    # =====================================================================
    # OUTROS
    # =====================================================================

    # Fade padrão.
    animation = fade, 1, 6, standard

    # Fade da tela quando perde foco.
    animation = fadeDim, 1, 6, standard

    # Animação da borda das janelas.
    animation = borderangle, 1, 50, linear, loop
}







